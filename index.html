<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalShop - Cross-Cultural E-Commerce</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap" rel="stylesheet">
<base target="_blank">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">GlobalShop</div>
        <div class="nav-controls">
            <!-- Country Dropdown -->
            <div class="dropdown-wrapper">
                <span class="selector-label">Region:</span>
                <select class="country-dropdown" id="countrySelect" onchange="setCountry(this.value)">
                    <option value="usa">🇺🇸 USA</option>
                    <option value="japan">🇯🇵 Japan</option>
                    <option value="ethiopia">🇪🇹 Ethiopia</option>
                    <option value="saudi">🇸🇦 Saudi Arabia</option>
                    <option value="spain">🇪🇸 Spain</option>
                </select>
            </div>
            <!-- Dark Mode Toggle -->
            <button class="theme-toggle" id="themeToggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main id="app">
        <!-- Views injected by JS -->
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
